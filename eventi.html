<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eventi | Mada Advances</title>
<style>
  :root {
    --ink:      #2b2b33;
    --muted:    #6c6c78;
    --rosa:     #e5457f;
    --rosa-soft:#fbe9f1;
    --line:     #ece9ef;
    --bg:       #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Poppins", "Segoe UI", system-ui, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 980px; margin: 0 auto; padding: 64px 24px 96px; }

  .eyebrow {
    font-size: .8rem; letter-spacing: .18em; text-transform: uppercase;
    color: var(--rosa); font-weight: 600; margin: 0 0 14px;
  }
  h1 {
    font-size: clamp(2rem, 5vw, 3rem); line-height: 1.1;
    margin: 0 0 20px; font-weight: 700; letter-spacing: -.01em;
  }
  .intro { font-size: 1.05rem; color: var(--muted); max-width: 62ch; margin: 0 0 8px; }
  .intro a { color: var(--rosa); text-decoration: none; border-bottom: 1px solid currentColor; }

  .partner-title {
    margin: 72px 0 6px; font-size: 1.35rem; font-weight: 700;
  }
  .partner-sub { margin: 0 0 34px; color: var(--muted); font-size: .95rem; }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  @media (max-width: 720px) { .grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 460px) { .grid { grid-template-columns: 1fr; } }

  /* --- IL LOGO CLICCABILE --- */
  .logo {
    display: flex; align-items: center; justify-content: center;
    padding: 26px; min-height: 150px;
    border: 1px solid var(--line); border-radius: 16px;
    background: #fff;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .logo img { max-width: 100%; max-height: 90px; width: auto; height: auto; display: block; }
  .logo:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(43,43,51,.10);
    border-color: var(--rosa);
  }
  .logo:focus-visible { outline: 3px solid var(--rosa); outline-offset: 3px; }

  /* evidenzia il logo di esempio */
  .logo[data-esempio] { background: var(--rosa-soft); border-color: var(--rosa); }

  @media (prefers-reduced-motion: reduce) {
    .logo { transition: none; }
    .logo:hover { transform: none; }
  }
</style>
</head>
